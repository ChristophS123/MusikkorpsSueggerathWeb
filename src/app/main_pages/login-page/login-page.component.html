<section class="login-shell">
    <div class="login-card">
        <div class="brand-block">
            <div class="icon">
                <img src="../../../assets/icon.png" height="200" width="170" alt="Musikkorps Sueggerath Logo">
            </div>
            <h1>Willkommen zurueck</h1>
            <p>Melde dich mit deiner E-Mail-Adresse und deinem Passwort an.</p>
        </div>

        <form #data="ngForm" class="login-form" (ngSubmit)="submitLoginData(data)">
            <div class="input-group">
                <label for="email">E-Mail</label>
                <input
                    id="email"
                    type="email"
                    name="email"
                    ngModel
                    #emailModel="ngModel"
                    required
                    email
                    autocomplete="email"
                    placeholder="name@beispiel.de"
                >
                <small *ngIf="emailModel.invalid && emailModel.touched">Bitte gib eine gueltige E-Mail-Adresse ein.</small>
            </div>

            <div class="input-group">
                <label for="password">Passwort</label>
                <input
                    id="password"
                    type="password"
                    name="password"
                    ngModel
                    #passwordModel="ngModel"
                    required
                    autocomplete="current-password"
                    placeholder="Dein Passwort"
                >
                <small *ngIf="passwordModel.invalid && passwordModel.touched">Bitte gib dein Passwort ein.</small>
            </div>

            <div class="status-message error" *ngIf="loginErrorMessage">{{ loginErrorMessage }}</div>
            <div class="status-message success" *ngIf="loginSuccessMessage">{{ loginSuccessMessage }}</div>
            <div class="status-message info" *ngIf="resetPasswordMessage">{{ resetPasswordMessage }}</div>

            <button type="submit" class="btn btn-primary login-button" [disabled]="isSubmitting || isSendingResetEmail">
                {{ isSubmitting ? 'Anmeldung laeuft...' : 'Anmelden' }}
            </button>

            <button type="button" class="link-button" (click)="sendResetPasswordEmail(data)" [disabled]="isSubmitting || isSendingResetEmail">
                {{ isSendingResetEmail ? 'Reset-E-Mail wird versendet...' : 'Passwort vergessen?' }}
            </button>
        </form>

        <p class="signup-hint">Noch kein Konto? <a routerLink="/registrieren">Konto erstellen</a></p>
    </div>
</section>
