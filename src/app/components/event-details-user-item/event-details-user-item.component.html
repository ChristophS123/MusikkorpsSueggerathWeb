<article class="user-status-card" [ngClass]="'status-' + getStatus()">
  <div class="user-identity">
    <div class="user-avatar">{{ user.username.charAt(0) || '?' }}</div>
    <div>
      <h4>{{ user.username }}</h4>
      <p>{{ getStatusDescription() }}</p>
    </div>
  </div>

  <div class="status-badge">{{ getStatusLabel() }}</div>
</article>
