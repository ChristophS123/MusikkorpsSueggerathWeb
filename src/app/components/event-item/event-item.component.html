<article class="event-card" [class.is-cancelled]="event.eventCancelled">
    <div class="event-card-header">
        <div class="event-primary">
            <h3>{{ event.name }}</h3>
            <p class="event-datetime">{{ getEventDateLabel() }} · {{ event.time }} Uhr</p>
        </div>

        <div class="event-header-links">
            <a *ngIf="event.training" class="event-secondary-link" [routerLink]="['/proben', event.documentID, 'stuecke']">
                Stücke
            </a>
            <a *ngIf="isAdmin" class="event-admin-link" [routerLink]="['/event-details', event.documentID]">
                Details
            </a>
        </div>
    </div>

    <div class="event-status-row">
        <span class="event-status-pill" [ngClass]="getStatusClass()">{{ getStatusLabel() }}</span>
    </div>


    <div class="event-actions" *ngIf="!event.eventCancelled">
        <button class="action-button decline" type="button" [class.active]="containsInCancelled()" [disabled]="containsInCancelled()" (click)="cancel()">
            {{ containsInCancelled() ? 'Abgesagt' : 'Absagen' }}
        </button>
        <button class="action-button maybe" type="button" [class.active]="containsInMaby()" [disabled]="containsInMaby()" (click)="maby()">
            {{ containsInMaby() ? '?' : '?' }}
        </button>
        <button class="action-button promise" type="button" [class.active]="containsInPromise()" [disabled]="containsInPromise()" (click)="promise()">
            {{ containsInPromise() ? 'Zugesagt' : 'Zusagen' }}
        </button>
    </div>
</article>
